<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Processor</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Order Processor</h1>

  <section class="panel">
    <h2>Create order</h2>
    <button id="create-order" type="button">Create new order</button>
  </section>

  <section class="panel">
    <h2>Add product</h2>
    <form id="add-product-form">
      <label>Order
        <select id="product-order" required></select>
      </label>
      <label>Name
        <input id="product-name" type="text" required>
      </label>
      <label>Color
        <select id="product-color" required>
          <option>Red</option><option>Pink</option><option>White</option><option>Yellow</option>
        </select>
      </label>
      <label>Size
        <select id="product-size" required>
          <option>Small</option><option>Medium</option><option>Large</option>
        </select>
      </label>
      <label>Price
        <input id="product-price" type="number" step="0.01" min="0" required>
      </label>
      <label>Discount (0&ndash;1)
        <input id="product-discount" type="number" step="0.01" min="0" max="1" value="0" required>
      </label>
      <label>Material
        <select id="product-material" required>
          <option>Glass</option><option>Electronic</option><option>Fabric</option><option>Metal</option>
        </select>
      </label>
      <label>Weight (kg)
        <input id="product-weight" type="number" step="0.01" min="0" required>
      </label>
      <label>Packaging
        <select id="product-packaging" required>
          <option>Boxed</option><option>Loose</option>
        </select>
      </label>
      <label class="checkbox">Fragile
        <input id="product-fragility" type="checkbox">
      </label>
      <label class="checkbox">Contains liquids
        <input id="product-contains-liquids" type="checkbox">
      </label>
      <label>Length (cm)
        <input id="product-length" type="number" step="0.01" min="0" required>
      </label>
      <label>Width (cm)
        <input id="product-width" type="number" step="0.01" min="0" required>
      </label>
      <label>Height (cm)
        <input id="product-height" type="number" step="0.01" min="0" required>
      </label>
      <button type="submit">Add product</button>
    </form>
  </section>

  <section class="panel">
    <h2>Orders</h2>
    <ul id="orders-list"></ul>
  </section>

  <script src="/app.js"></script>
</body>
</html>
